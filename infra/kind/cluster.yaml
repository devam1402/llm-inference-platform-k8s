# kind cluster configuration for the LLM Inference Platform
# 2 nodes: 1 control-plane + 1 worker
# Worker has combined labels (apps + data) to host all workload types
# Port mappings expose service NodePorts to localhost

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: llm-platform

# ──────────────────────────────────────────
# Networking
# ──────────────────────────────────────────
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

# ──────────────────────────────────────────
# Nodes
# ──────────────────────────────────────────
nodes:

  # ── Control plane ──────────────────────
  - role: control-plane
    image: kindest/node:v1.31.0
    extraPortMappings:
      # Ingress (Stage 6 will use these)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # NodePort range mapped to host ports (same as docker-compose)
      - containerPort: 30400
        hostPort: 4000
        protocol: TCP
      - containerPort: 30800
        hostPort: 8002
        protocol: TCP
      - containerPort: 30801
        hostPort: 8001
        protocol: TCP
      - containerPort: 30909
        hostPort: 9090
        protocol: TCP
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      - containerPort: 30166
        hostPort: 16686
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

  # ── Worker — combined apps + data tier (single-worker setup) ──
  # Multiple labels let this one node host both app and data workloads.
  # Production would split these into separate node pools (Stage 7).
  - role: worker
    image: kindest/node:v1.31.0
    labels:
      workload: apps
      workload-data: "true"
      tier: combined
