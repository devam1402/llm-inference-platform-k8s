apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: llm-platform
  labels:
    app: router
    app.kubernetes.io/name: router
    app.kubernetes.io/part-of: llm-platform
spec:
  type: ClusterIP   # Internal only — overlay will change to NodePort for local
  selector:
    app: router
  ports:
    - name: http
      port: 4000          # Service port (other pods call router:4000)
      targetPort: 4000    # Container port
      protocol: TCP
