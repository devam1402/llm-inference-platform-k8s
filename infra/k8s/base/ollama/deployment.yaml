apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm-platform
  labels:
    app: ollama
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: llm-platform
    app.kubernetes.io/component: inference
spec:
  replicas: 1   # CPU inference doesn't scale well horizontally
  strategy:
    type: Recreate   # Stateful-ish: ensure old pod is fully gone before new one
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: inference
    spec:
      # Schedule on data-tier node (where heavier workloads go)
      # Falls back to any node if no node has this label
      nodeSelector:
        workload: data

      # Tolerate longer startup
      terminationGracePeriodSeconds: 30

      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 11434
              protocol: TCP

          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            # Disable model pre-loading on startup (we'll pull manually)
            - name: OLLAMA_NUM_PARALLEL
              value: "1"

          # Mount volume for model storage
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama

          # TCP probe — Ollama doesn't have a clean /health endpoint
          # k8s just checks if the port accepts a TCP connection
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Higher resources for LLM inference
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"   # 2 full CPUs
              memory: "4Gi"  # 4 GB

      volumes:
        # emptyDir: tied to pod lifetime
        # Survives container restarts in the same pod
        # LOST if pod is deleted/rescheduled (re-download model)
        # Step 12 shows how to use a real PersistentVolumeClaim
        - name: ollama-data
          emptyDir:
            sizeLimit: 5Gi
