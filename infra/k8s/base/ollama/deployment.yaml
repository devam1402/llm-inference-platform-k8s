apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm-platform
  labels:
    app: ollama
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: llm-platform
    app.kubernetes.io/component: inference
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: inference
    spec:
      # Schedule on node with workload-data label (combined worker has this)
      nodeSelector:
        workload-data: "true"

      terminationGracePeriodSeconds: 30

      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 11434
              protocol: TCP

          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"

          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama

          # TCP probes — Ollama doesn't expose clean HTTP health endpoints
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

      volumes:
        # emptyDir: tied to pod lifetime.
        # Survives container restarts in the same pod.
        # LOST if pod is deleted/rescheduled.
        # Step 12 will show PersistentVolumeClaim for true persistence.
        - name: ollama-data
          emptyDir:
            sizeLimit: 5Gi
